<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
        h2 { text-align: center; }
        .card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin-top: 20px; }
        .logout-form { text-align: center; margin-top: 24px; }
        button { padding: 10px 20px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #d32f2f; }
    </style>
</head>
<body>
    <h2>Dashboard</h2>
    <div class="card">
        <p>Welcome, <strong sec:authentication="name">User</strong>!</p>
        <p>You are logged in with role: <span sec:authentication="authorities">ROLE</span></p>
    </div>
    <div class="logout-form">
        <form th:action="@{/logout}" method="post">
            <button type="submit">Logout</button>
        </form>
    </div>
</body>
</html>
