<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
        h2 { text-align: center; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-weight: bold; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; text-align: center; }
        .success { color: green; text-align: center; }
        button { padding: 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1976D2; }
        .link { text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <h2>Login</h2>

    <p class="error" th:if="${param.error}">Invalid username or password.</p>
    <p class="success" th:if="${param.logout}">You have been logged out.</p>
    <p class="success" th:if="${param.registered}">Registration successful! Please login.</p>

    <form th:action="@{/login}" method="post">
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Login</button>
    </form>
    <p class="link">Don't have an account? <a th:href="@{/register}">Register here</a></p>
</body>
</html>
